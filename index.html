/* ضع هذا في ملف CSS أو داخل <style> */
.cover-3d {
  position: relative;
}

.cover-3d::after {
  content: '';
  position: absolute;
  top: 20px;               /* المسافة أسفل الصورة */
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(184,134,11,0.5), rgba(0,0,0,0.5));
  border-radius: 10px;
  transform: scale(0.95);
  filter: blur(8px);       /* يعطي إحساس بالعمق */
  z-index: -1;             /* طبقة خلف الصورة */
}
